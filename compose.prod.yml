services:
    nginx:
        image: nginx:1.29-alpine
        restart: always
        expose:
            - 80
        volumes:
            - webroot:/var/www/html:ro
            - uploads:/var/www/html/wp-content/uploads:ro
            - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
            # Named volume so the FastCGI page cache survives nginx restarts.
            # Clear it manually: docker compose exec nginx rm -rf /var/cache/nginx/fastcgi/*
            - nginx_cache:/var/cache/nginx/fastcgi
        depends_on:
            wordpress:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    wordpress:
        build:
            context: .
            dockerfile: docker/wordpress/Dockerfile.prod
        restart: always
        expose:
            - 9000
        environment:
            WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
            WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
            # Harden WordPress for production.
            # DISALLOW_FILE_MODS prevents plugin/theme installs via wp-admin,
            # which is correct — all code changes must go through a redeploy.
            WORDPRESS_CONFIG_EXTRA: |
                define('WP_DEBUG', false);
                define('WP_DEBUG_DISPLAY', false);
                define('WP_DEBUG_LOG', false);
                define('DISALLOW_FILE_EDIT', true);
                define('DISALLOW_FILE_MODS', true);
            # Redis object cache — requires the "Redis Object Cache" plugin
            # (https://wordpress.org/plugins/redis-cache/) to be installed and activated.
            WP_REDIS_HOST: redis
        volumes:
            # webroot is populated from the image on first start by Docker.
            # On redeploy: docker compose down -v && docker compose up -d
            - webroot:/var/www/html
            - uploads:/var/www/html/wp-content/uploads
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    db:
        image: mariadb:11.8
        restart: always
        volumes:
            - db_data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
            MYSQL_USER: ${WORDPRESS_DB_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    redis:
        image: redis:7-alpine
        restart: always
        # Cap memory, evict least-recently-used keys when full, disable RDB persistence.
        # This is correct for a pure object cache — no durability needed.
        # 256MB vs dev's 128MB — prod sees more concurrent traffic and a warmer cache
        # has a larger working set. Monitor evictions: redis-cli info stats | grep evicted_keys
        command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

volumes:
    webroot:
    uploads:
    db_data:
    nginx_cache:
