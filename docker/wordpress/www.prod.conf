[www]
user  = www-data
group = www-data

; Listen on TCP so nginx can connect via wordpress:9000
listen = 9000

; Static process manager — keeps a fixed pool of workers always ready.
; Eliminates spawn overhead under sustained traffic. Set pm.max_children to:
;   floor(available_RAM_MB / avg_PHP_process_MB)
; A WordPress PHP-FPM process typically uses 32–64 MB; start at 50 and tune.
pm                   = static
pm.max_children      = 50

; Recycle workers after 500 requests to prevent memory leaks from accumulating.
pm.max_requests      = 500
