[opcache]
; Dev: validate timestamps on every request so file changes are always picked up.
; OPcache still compiles and caches opcodes between requests — you get the
; compilation speedup without stale-cache surprises during active development.
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 20000
opcache.validate_timestamps    = 1
opcache.revalidate_freq        = 0
opcache.save_comments          = 1

; JIT is disabled in dev — tracing mode is designed for long-running processes.
; WordPress's request/response cycle is too short to amortize JIT compilation
; overhead; in practice it adds latency rather than removing it.
opcache.jit_buffer_size        = 0
