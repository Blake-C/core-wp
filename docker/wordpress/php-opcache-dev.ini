[opcache]
; Dev: validate timestamps on every request so file changes are always picked up.
; OPcache still compiles and caches opcodes between requests — you get the
; compilation speedup without stale-cache surprises during active development.
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files  = 10000
opcache.validate_timestamps    = 1
opcache.revalidate_freq        = 0
opcache.save_comments          = 1

; JIT — tracing mode compiles hot paths at runtime. 64M buffer is sufficient for dev.
opcache.jit                    = tracing
opcache.jit_buffer_size        = 64M
