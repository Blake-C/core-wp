[www]
user  = www-data
group = www-data

; Listen on TCP so nginx can connect via wordpress:9000
listen = 9000

; Dynamic process manager — spawns workers on demand, trims idle ones.
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Recycle workers after 500 requests to prevent memory leaks from accumulating.
pm.max_requests = 500

; Log requests that take longer than 5 seconds — useful for catching slow hooks
; and plugins in dev. Output goes to Docker's stderr (visible via docker compose logs).
slowlog                  = /proc/self/fd/2
request_slowlog_timeout  = 5s
