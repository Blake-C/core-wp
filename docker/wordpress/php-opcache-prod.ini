[opcache]
; Prod: disable timestamp validation — files never change between deploys.
; PHP skips stat() syscalls on every file for every request, which is a
; meaningful throughput improvement. Run `docker compose down -v && up -d`
; on redeploy to pick up new code (the webroot volume is rebuilt from the image).
opcache.enable                 = 1
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
opcache.validate_timestamps    = 0
opcache.revalidate_freq        = 0
opcache.save_comments          = 1

; JIT — tracing mode compiles hot paths at runtime. 128M buffer for production load.
opcache.jit                    = tracing
opcache.jit_buffer_size        = 128M
