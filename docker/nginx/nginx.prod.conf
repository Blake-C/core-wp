# ── HTTP context directives (this file is included inside the http block) ────

server_tokens off;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
	application/atom+xml
	application/javascript
	application/json
	application/rss+xml
	application/vnd.ms-fontobject
	application/x-font-ttf
	application/x-web-app-manifest+json
	application/xhtml+xml
	application/xml
	font/opentype
	image/svg+xml
	image/x-icon
	text/css
	text/plain
	text/x-component;

# Limit wp-login.php to 10 requests/min per IP to slow brute-force attempts
limit_req_zone $binary_remote_addr zone=wp_login:10m rate=10r/m;

# ── Server block ──────────────────────────────────────────────────────────────

server {
	listen 80;
	server_name _;
	root /var/www/html;
	index index.php;

	client_max_body_size 64M;

	# Security headers
	# Note: HSTS and CSP should be set by the TLS-terminating reverse proxy/CDN
	add_header X-Frame-Options SAMEORIGIN always;
	add_header X-Content-Type-Options nosniff always;
	add_header X-XSS-Protection "1; mode=block" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	# Deny access to hidden files (.env, .git, .htaccess, etc.)
	location ~ /\. {
		deny all;
	}

	# Block direct access to wp-config.php
	location = /wp-config.php {
		deny all;
	}

	# Block XML-RPC — remove this rule if you use Jetpack or WP mobile apps
	location = /xmlrpc.php {
		deny all;
	}

	# Prevent PHP execution inside uploads (uploaded-file code execution attack)
	location ~* /wp-content/uploads/.*\.php$ {
		deny all;
	}

	# Rate-limit the login page
	location = /wp-login.php {
		limit_req zone=wp_login burst=5 nodelay;
		try_files $uri =404;
		fastcgi_param HTTP_PROXY "";
		fastcgi_pass wordpress:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_read_timeout 300;
		include fastcgi_params;
	}

	# Static assets — served directly with long-lived cache headers
	location ~* \.(css|js|gif|ico|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot|otf)$ {
		expires max;
		log_not_found off;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# WordPress permalinks
	location / {
		try_files $uri $uri/ /index.php?$args;
	}

	# PHP via FastCGI (wordpress:9000)
	location ~ \.php$ {
		# Prevent nginx from passing non-existent PHP files to FPM
		# (blocks uploaded-file PHP execution: /uploads/evil.jpg/index.php)
		try_files $uri =404;
		# Mitigate httpoxy vulnerability
		fastcgi_param HTTP_PROXY "";
		fastcgi_pass wordpress:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_read_timeout 300;
		include fastcgi_params;
	}
}
