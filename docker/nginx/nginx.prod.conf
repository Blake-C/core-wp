# ── HTTP context directives (this file is included inside the http block) ────

server_tokens off;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
	application/atom+xml
	application/javascript
	application/json
	application/rss+xml
	application/vnd.ms-fontobject
	application/wasm
	application/x-font-ttf
	application/x-web-app-manifest+json
	application/xhtml+xml
	application/xml
	font/opentype
	image/svg+xml
	image/x-icon
	text/css
	text/plain
	text/x-component;

# Limit wp-login.php to 10 requests/min per IP to slow brute-force attempts
limit_req_zone $binary_remote_addr zone=wp_login:10m rate=10r/m;

# ── PHP-FPM upstream (keepalive reuses connections across requests) ────────────

upstream php_fpm {
	server wordpress:9000;
	keepalive 16;
}

# ── FastCGI page cache (anonymous traffic only) ───────────────────────────────
# Cached HTML is served from /var/cache/nginx/fastcgi without hitting PHP.
# Cache is bypassed for logged-in users, POST requests, and query strings.
# TTL: 10 minutes. Clear by restarting the nginx container, or set a shorter
# TTL if your content updates more frequently.

fastcgi_cache_path /var/cache/nginx/fastcgi
	levels=1:2
	keys_zone=wordpress:50m
	inactive=60m
	max_size=256m
	use_temp_path=off;

fastcgi_cache_key "$scheme$request_method$host$request_uri";

# ── Server block ──────────────────────────────────────────────────────────────

server {
	listen 80;
	server_name _;
	root /var/www/html;
	index index.php;

	client_max_body_size 64M;

	# Security headers
	# Note: HSTS and CSP should be set by the TLS-terminating reverse proxy/CDN
	add_header X-Frame-Options SAMEORIGIN always;
	add_header X-Content-Type-Options nosniff always;
	add_header X-XSS-Protection "1; mode=block" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	# ── FastCGI cache bypass conditions ──────────────────────────────────────
	# Skip cache for: POST requests, query strings, logged-in users/commenters
	set $skip_cache 0;

	if ($request_method = POST) {
		set $skip_cache 1;
	}
	if ($query_string != "") {
		set $skip_cache 1;
	}
	if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
		set $skip_cache 1;
	}
	if ($request_uri ~* "^/wp-(admin|cron|json)/|^/xmlrpc\.php") {
		set $skip_cache 1;
	}

	# Deny access to hidden files (.env, .git, .htaccess, etc.)
	location ~ /\. {
		deny all;
	}

	# Block direct access to wp-config.php
	location = /wp-config.php {
		deny all;
	}

	# Block XML-RPC — remove this rule if you use Jetpack or WP mobile apps
	location = /xmlrpc.php {
		deny all;
	}

	# Prevent PHP execution inside uploads (uploaded-file code execution attack)
	location ~* /wp-content/uploads/.*\.php$ {
		deny all;
	}

	# Rate-limit the login page (cache explicitly bypassed)
	location = /wp-login.php {
		limit_req zone=wp_login burst=5 nodelay;
		try_files $uri =404;
		fastcgi_param HTTP_PROXY "";
		fastcgi_pass php_fpm;
		fastcgi_keep_conn on;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_read_timeout 60;
		fastcgi_buffer_size       16k;
		fastcgi_buffers           8 16k;
		fastcgi_busy_buffers_size 32k;
		fastcgi_cache_bypass 1;
		fastcgi_no_cache 1;
		include fastcgi_params;
	}

	# Static assets — served directly with long-lived cache headers
	location ~* \.(css|js|gif|ico|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot|otf)$ {
		expires max;
		log_not_found off;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# WordPress permalinks
	location / {
		try_files $uri $uri/ /index.php?$args;
	}

	# PHP via FastCGI (upstream php_fpm with keepalive + page cache)
	location ~ \.php$ {
		# Prevent nginx from passing non-existent PHP files to FPM
		# (blocks uploaded-file PHP execution: /uploads/evil.jpg/index.php)
		try_files $uri =404;
		# Mitigate httpoxy vulnerability
		fastcgi_param HTTP_PROXY "";
		fastcgi_pass php_fpm;
		fastcgi_keep_conn on;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_read_timeout 60;
		fastcgi_buffer_size       16k;
		fastcgi_buffers           8 16k;
		fastcgi_busy_buffers_size 32k;
		include fastcgi_params;

		fastcgi_cache wordpress;
		fastcgi_cache_valid 200 10m;
		fastcgi_cache_bypass $skip_cache;
		fastcgi_no_cache $skip_cache;
		add_header X-FastCGI-Cache $upstream_cache_status;
	}
}
