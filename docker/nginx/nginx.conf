# Reuse FPM connections across requests instead of opening a new TCP connection each time.
upstream php_fpm {
	server wordpress:9000;
	keepalive 16;
}

server {
	listen 80;
	server_name _;
	root /var/www/html;
	index index.php index.html;

	# Match WordPress upload limit (see php.ini / WP_MEMORY_LIMIT)
	client_max_body_size 64M;

	# Gzip — compress text assets in dev so browser-sync reflects realistic sizes
	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_min_length 256;
	gzip_types
		application/javascript
		application/json
		application/wasm
		application/xml
		font/opentype
		image/svg+xml
		image/x-icon
		text/css
		text/plain;

	# Deny access to hidden files
	location ~ /\. {
		deny all;
	}

	# Cache open file descriptors to reduce stat() syscalls on repeated requests.
	open_file_cache          max=1000 inactive=20s;
	open_file_cache_valid    30s;
	open_file_cache_min_uses 2;
	open_file_cache_errors   on;

	# Serve static files directly without PHP
	location ~* \.(css|js|gif|ico|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot|otf)$ {
		expires max;
		log_not_found off;
		try_files $uri =404;
	}

	# WordPress permalinks
	location / {
		try_files $uri $uri/ /index.php?$args;
	}

	# PHP via FastCGI (upstream php_fpm with keepalive)
	location ~ \.php$ {
		# Prevent nginx from passing non-existent PHP files to FPM
		# (blocks uploaded-file PHP execution: /uploads/evil.jpg/index.php)
		try_files $uri =404;
		# Mitigate httpoxy vulnerability
		fastcgi_param HTTP_PROXY "";
		fastcgi_pass php_fpm;
		fastcgi_keep_conn on;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_read_timeout 60;
		fastcgi_buffer_size    16k;
		fastcgi_buffers        8 16k;
		fastcgi_busy_buffers_size 32k;
		include fastcgi_params;
	}
}
