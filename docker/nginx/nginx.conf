server {
	listen 80;
	server_name _;
	root /var/www/html;
	index index.php index.html;

	# Match WordPress upload limit (see php.ini / WP_MEMORY_LIMIT)
	client_max_body_size 64M;

	# Deny access to hidden files
	location ~ /\. {
		deny all;
	}

	# Serve static files directly without PHP
	location ~* \.(css|js|gif|ico|jpg|jpeg|png|svg|webp|woff|woff2|ttf|eot|otf)$ {
		expires max;
		log_not_found off;
		try_files $uri =404;
	}

	# WordPress permalinks
	location / {
		try_files $uri $uri/ /index.php?$args;
	}

	# PHP via FastCGI (wordpress:9000)
	location ~ \.php$ {
		# Prevent nginx from passing non-existent PHP files to FPM
		# (blocks uploaded-file PHP execution: /uploads/evil.jpg/index.php)
		try_files $uri =404;
		# Mitigate httpoxy vulnerability
		fastcgi_param HTTP_PROXY "";
		fastcgi_pass wordpress:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_read_timeout 300;
		include fastcgi_params;
	}
}
