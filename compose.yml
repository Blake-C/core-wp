services:
    cli_tools:
        image: digitalblake/light-cli:5.0.0
        volumes:
            - ./wp-content:/home/webdev/www/public_html/wp-content
            - ./functions.zsh:/home/webdev/.config/zsh/functions.zsh
            - ./wordpress:/home/webdev/www/public_html
            - ./.pnpm-store:/home/webdev/node/.local/share/pnpm/store
        ports:
            - '3000:3000'
            - '3001:3001'
        tty: true
        environment:
            APP_ENV: docker
            BROWSER_SYNC_PORT: 3000
            SHELL: /bin/zsh
            WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
            WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}

    wordpress:
        build:
            context: ./docker/wordpress
            dockerfile: Dockerfile
        restart: always
        ports:
            - 80:80
        environment:
            WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
            WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
            # Remove or set to "off" to disable XDebug overhead when not debugging.
            XDEBUG_MODE: debug
        volumes:
            - ./wp-content:/var/www/html/wp-content
            - ./wordpress:/var/www/html
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    db:
        image: mariadb:11.4
        restart: always
        volumes:
            - ./data/mysql:/var/lib/mysql
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    phpmyadmin:
        image: phpmyadmin
        restart: always
        depends_on:
            - db
        ports:
            - '8000:80'
        environment:
            PMA_ARBITRARY: 1
            UPLOAD_LIMIT: 1500M
