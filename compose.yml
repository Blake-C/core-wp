services:
    cli_tools:
        image: digitalblake/light-cli:5.0.0
        volumes:
            - ./wp-content:/home/webdev/www/public_html/wp-content
            - ./functions.zsh:/home/webdev/.config/zsh/functions.zsh
            - ./.pnpm-store:/home/webdev/node/.local/share/pnpm/store
            - ./wordpress:/home/webdev/www/public_html/
        ports:
            - '3000:3000'
            - '3001:3001'
        tty: true
        environment:
            APP_ENV: docker
            BROWSER_SYNC_PORT: 3000
            SHELL: /bin/zsh
            WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
            WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}

    nginx:
        image: nginx:1.29-alpine
        restart: always
        ports:
            - 80:80
        volumes:
            - ./wordpress:/var/www/html
            - ./wp-content:/var/www/html/wp-content
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            wordpress:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null 2>&1 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    wordpress:
        build:
            context: ./docker/wordpress
            dockerfile: Dockerfile
        restart: always
        environment:
            WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
            WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
            WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
            WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
            WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
            # Set XDEBUG_MODE=debug in .env to enable debugging.
            # Defaults to "off" to avoid PHP performance overhead.
            XDEBUG_MODE: ${XDEBUG_MODE:-off}
            # Redis object cache — requires the "Redis Object Cache" plugin
            # (https://wordpress.org/plugins/redis-cache/) to be installed and activated.
            WP_REDIS_HOST: redis
        volumes:
            - ./wordpress:/var/www/html
            - ./wp-content:/var/www/html/wp-content
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    db:
        image: mariadb:11.8
        restart: always
        volumes:
            - ./data/mysql:/var/lib/mysql
            - ./docker/mysql/my-dev.cnf:/etc/mysql/conf.d/my.cnf:ro
        ports:
            - '127.0.0.1:3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    redis:
        image: redis:7-alpine
        restart: always
        # Cap memory, evict least-recently-used keys when full, disable RDB persistence.
        # This is correct for a pure object cache — no durability needed.
        command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

    phpmyadmin:
        image: phpmyadmin
        restart: unless-stopped
        depends_on:
            - db
        ports:
            - '127.0.0.1:8000:80'
        environment:
            PMA_ARBITRARY: 1
            UPLOAD_LIMIT: 1500M
