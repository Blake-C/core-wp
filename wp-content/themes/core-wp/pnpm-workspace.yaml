packages:
  - '.'

# Force a patched transitive ws (pulled in by browser-sync via socket.io).
# Fixes CVE-2026-45736 (use of uninitialized resource); fixed in ws >= 8.20.1.
overrides:
  ws: '^8.20.1'

confirmModulesPurge: false
frozenLockfile: true
auditLevel: moderate
saveExact: true
verifyStoreIntegrity: true
strictDeprecatedDependencies: warn
blockExoticSubdeps: true
minimumReleaseAge: 10080
fetchTimeout: 60000
fetchRetries: 5
fetchRetryMintimeout: 1000
fetchRetryMaxtimeout: 30000
# Explicit build script allowlist.
# @parcel/watcher is a native addon required by chokidar-cli; it must build.
# core-js postinstall is a donation banner only — blocked, has no effect on functionality.
allowBuilds:
  '@parcel/watcher': true
  core-js: false
