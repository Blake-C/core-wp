packages:
  - '.'

# Force patched transitive dependencies flagged by Snyk.
# ws: CVE-2026-45736 (use of uninitialized resource); fixed in ws >= 8.20.1.
# js-yaml: CVE-2026-53550 (inefficient algorithmic complexity); fixed in >= 4.2.0.
# postcss-selector-parser: CVE-2026-9358 (uncontrolled recursion); fixed in >= 6.1.3.
# brace-expansion: CVE-2026-13149 (inefficient algorithmic complexity); fixed in >= 5.0.7.
# fast-uri: CVE-2026-13676 (interpretation conflict); fixed in >= 3.1.3.
overrides:
  ws: '^8.20.1'
  js-yaml: '^4.2.0'
  postcss-selector-parser: '^6.1.3'
  brace-expansion: '^5.0.7'
  fast-uri: '^3.1.3'

confirmModulesPurge: false
frozenLockfile: true
auditLevel: moderate
saveExact: true
verifyStoreIntegrity: true
strictDeprecatedDependencies: warn
blockExoticSubdeps: true
minimumReleaseAge: 10080
fetchTimeout: 60000
fetchRetries: 5
fetchRetryMintimeout: 1000
fetchRetryMaxtimeout: 30000
# Explicit build script allowlist.
# @parcel/watcher is a native addon required by chokidar-cli; it must build.
# core-js postinstall is a donation banner only — blocked, has no effect on functionality.
allowBuilds:
  '@parcel/watcher': true
  core-js: false
